# =============================================
# Community Centre Booking System - Config
# =============================================

# Server
server.port=8080

# =============================================
# MySQL Database
# Change username/password to match yours
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/community_center?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=YOUR_PASSWORD 
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Frontend base URL (used for QR code generation)
app.frontend.baseUrl=http://localhost:5500

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
