<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Room – CentreBook</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1E3A8A; --primary-light: #3B82F6;
      --green: #22C55E; --green-bg: #F0FDF4;
      --yellow: #F59E0B; --yellow-bg: #FFFBEB;
      --red: #EF4444; --red-bg: #FEF2F2;
      --gray-50:#F9FAFB; --gray-100:#F3F4F6; --gray-200:#E5E7EB;
      --gray-400:#9CA3AF; --gray-600:#4B5563; --gray-800:#1F2937;
      --radius: 14px;
    }
    body { font-family: 'DM Sans', sans-serif; background: #F0F4FF; min-height: 100vh; color: var(--gray-800); }
    nav { background: var(--primary); padding: 0 20px; height: 56px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(30,58,138,.25); }
    .back-btn { background: rgba(255,255,255,.15); border: none; color: white; width: 34px; height: 34px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; }
    .nav-title { font-family: 'Space Grotesk', sans-serif; font-size: 17px; font-weight: 600; color: white; flex: 1; }
    .nav-hist { background: rgba(255,255,255,.15); border: none; color: white; padding: 7px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
    .page-wrap { max-width: 560px; margin: 0 auto; padding: 20px 16px 60px; }
    .room-status-card { background: white; border-radius: var(--radius); padding: 22px; margin-bottom: 18px; box-shadow: 0 1px 4px rgba(0,0,0,.07); border-left: 5px solid var(--primary); }
    .room-status-card.available { border-color: var(--green); }
    .room-status-card.partial { border-color: var(--yellow); }
    .room-status-card.full { border-color: var(--red); }
    .rs-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .rs-name { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; }
    .rs-type { font-size: 13px; color: var(--gray-400); margin-top: 3px; }
    .status-pill { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; }
    .status-pill.available { background: var(--green-bg); color: #15803D; }
    .status-pill.partial { background: var(--yellow-bg); color: #92400E; }
    .status-pill.full { background: var(--red-bg); color: #B91C1C; }
    .pill-dot { width: 8px; height: 8px; border-radius: 50%; }
    .available .pill-dot { background: var(--green); }
    .partial .pill-dot { background: var(--yellow); }
    .full .pill-dot { background: var(--red); }
    .cap-bar-wrap { margin-top: 16px; }
    .cap-lbl { display: flex; justify-content: space-between; font-size: 13px; color: var(--gray-600); margin-bottom: 6px; }
    .cap-bar { height: 8px; background: var(--gray-100); border-radius: 6px; overflow: hidden; }
    .cap-fill { height: 100%; border-radius: 6px; transition: width .5s; }
    .cap-fill.available { background: var(--green); }
    .cap-fill.partial { background: var(--yellow); }
    .cap-fill.full { background: var(--red); }
    .full-banner { background: var(--red-bg); border: 1.5px solid #FECACA; border-radius: var(--radius); padding: 24px; text-align: center; margin-bottom: 18px; }
    .full-banner .icon { font-size: 36px; margin-bottom: 8px; }
    .full-banner h3 { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 600; color: #B91C1C; }
    .full-banner p { font-size: 14px; color: #DC2626; margin-top: 6px; }
    .form-card { background: white; border-radius: var(--radius); padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
    .form-title { font-family: 'Space Grotesk', sans-serif; font-size: 17px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .role-selector { display: flex; gap: 10px; margin-bottom: 20px; }
    .role-btn { flex: 1; padding: 12px; border: 2px solid var(--gray-200); background: white; border-radius: 10px; cursor: pointer; text-align: center; transition: all .2s; }
    .role-btn .role-icon { font-size: 22px; display: block; margin-bottom: 4px; }
    .role-btn .role-lbl { font-size: 14px; font-weight: 500; color: var(--gray-600); }
    .role-btn.selected { border-color: var(--primary-light); background: #EFF6FF; }
    .role-btn.selected .role-lbl { color: var(--primary); }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--gray-600); margin-bottom: 6px; }
    label span { color: #EF4444; }
    input, select { width: 100%; padding: 11px 14px; border: 1.5px solid var(--gray-200); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--gray-800); background: white; transition: border-color .2s; outline: none; }
    input:focus, select:focus { border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
    .submit-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: all .2s; }
    .submit-btn:hover { background: #1d4ed8; transform: translateY(-1px); }
    .submit-btn:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; transform: none; }
    .error-msg { background: var(--red-bg); color: #B91C1C; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 12px; display: none; }
    .success-card { display: none; background: white; border-radius: var(--radius); padding: 32px 24px; box-shadow: 0 1px 4px rgba(0,0,0,.07); text-align: center; }
    .success-icon { width: 64px; height: 64px; background: var(--green-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 28px; }
    .success-title { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .success-sub { font-size: 14px; color: var(--gray-600); margin-bottom: 16px; }
    .entry-info { background: var(--gray-50); border-radius: 10px; padding: 14px; margin-bottom: 20px; text-align: left; }
    .entry-info-row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid var(--gray-100); }
    .entry-info-row:last-child { border-bottom: none; }
    .entry-info-row .key { color: var(--gray-400); }
    .entry-info-row .val { font-weight: 500; }
    .logout-btn { width: 100%; background: var(--red-bg); color: #B91C1C; border: 1.5px solid #FECACA; padding: 14px; border-radius: 12px; font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s; }
    .logout-btn:hover { background: #FEE2E2; }
    .history-section { margin-top: 24px; }
    .history-title { font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600; margin-bottom: 14px; }
    .history-list { display: flex; flex-direction: column; gap: 10px; }
    .history-card { background: white; border-radius: 10px; padding: 14px 16px; box-shadow: 0 1px 3px rgba(0,0,0,.06); border-left: 4px solid var(--gray-200); }
    .history-card.active-entry { border-color: var(--green); }
    .hc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .hc-name { font-weight: 600; font-size: 14px; }
    .hc-badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; }
    .hc-badge.active { background: var(--green-bg); color: #15803D; }
    .hc-badge.exited { background: var(--gray-100); color: var(--gray-600); }
    .hc-detail { font-size: 12px; color: var(--gray-400); display: flex; gap: 12px; flex-wrap: wrap; }
    .loader { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<nav>
  <a href="rooms.html" class="back-btn">←</a>
  <div class="nav-title" id="nav-room-name">Loading…</div>
  <a href="history.html" class="nav-hist">📋 History</a>
</nav>
<div class="page-wrap">
  <div class="room-status-card" id="room-status-card">
    <div class="rs-top">
      <div><div class="rs-name" id="room-name">–</div><div class="rs-type" id="room-type">–</div></div>
      <div class="status-pill" id="status-pill"><div class="pill-dot"></div><span id="status-text">Loading</span></div>
    </div>
    <div class="cap-bar-wrap">
      <div class="cap-lbl"><span>Capacity</span><span id="cap-label">– / –</span></div>
      <div class="cap-bar"><div class="cap-fill" id="cap-fill" style="width:0%"></div></div>
    </div>
  </div>
  <div class="full-banner" id="full-banner" style="display:none">
    <div class="icon">🚫</div>
    <h3>Cabin Full</h3>
    <p>This space is at full capacity. Please try another room or check back later.</p>
  </div>
  <div class="form-card" id="form-card">
    <div class="form-title">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1E3A8A" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      Register Entry
    </div>
    <div class="role-selector">
      <div class="role-btn selected" id="btn-student" onclick="selectRole('Student')"><span class="role-icon">🎓</span><div class="role-lbl">Student</div></div>
      <div class="role-btn" id="btn-professor" onclick="selectRole('Professor')"><span class="role-icon">👨‍🏫</span><div class="role-lbl">Professor</div></div>
    </div>
    <div class="field"><label>Full Name <span>*</span></label><input type="text" id="f-name" placeholder="Enter your full name" /></div>
    <div class="field"><label id="usn-label">USN <span>*</span></label><input type="text" id="f-usn" placeholder="e.g., 1XX21CS001" /></div>
    <div class="field"><label>Number of People (including you) <span>*</span></label><input type="number" id="f-count" min="1" value="1" /></div>
    <div class="field"><label>Team Members / Colleagues</label><input type="text" id="f-team" placeholder="Names separated by commas (optional)" /></div>
    <div class="field">
      <label>Purpose of Visit <span>*</span></label>
      <select id="f-purpose">
        <option value="">Select purpose</option>
        <option>Project Work</option><option>Seminar</option><option>Meeting</option>
        <option>Study Group</option><option>Presentation Practice</option>
        <option>Faculty Discussion</option><option>Event</option><option>Other</option>
      </select>
    </div>
    <div class="field" id="other-field" style="display:none"><label>Specify Purpose</label><input type="text" id="f-other" placeholder="Describe your purpose" /></div>
    <div class="error-msg" id="error-msg"></div>
    <button class="submit-btn" id="submit-btn" onclick="submitEntry()">✅ Confirm Entry</button>
  </div>
  <div class="success-card" id="success-card">
    <div class="success-icon">✅</div>
    <div class="success-title">You're Checked In!</div>
    <div class="success-sub" id="success-sub">–</div>
    <div class="entry-info" id="entry-info"></div>
    <button class="logout-btn" onclick="checkOut()">🚪 Leave Room</button>
  </div>
  <div class="history-section" id="room-history" style="display:none">
    <div class="history-title">📋 Recent Activity – <span id="hist-room-name"></span></div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>
<script>
  const API = 'http://localhost:8080/api';
  const ROOM_ID = parseInt(new URLSearchParams(window.location.search).get('room_id') || '1');
  let selectedRole = 'Student', currentEntryId = null, currentEntryData = null;
  const ROOMS_STATIC = {1:{name:'Cabin 1',type:'Small Cabin',capacity:6},2:{name:'Cabin 2',type:'Small Cabin',capacity:6},3:{name:'Cabin 3',type:'Small Cabin',capacity:6},4:{name:'Cabin 4',type:'Small Cabin',capacity:6},5:{name:'Project Room A',type:'Project Room',capacity:12},6:{name:'Project Room B',type:'Project Room',capacity:12},7:{name:'Top Floor Open Space',type:'Open Space',capacity:40},8:{name:'Main Hall',type:'Ground Floor Hall',capacity:80},9:{name:'Seminar Room',type:'Seminar',capacity:30},10:{name:'Discussion Room',type:'Meeting',capacity:10}};

  async function loadRoom() {
    let room = { ...ROOMS_STATIC[ROOM_ID], id: ROOM_ID, occupied: 0 };
    try { const res = await fetch(`${API}/rooms/${ROOM_ID}`); if (res.ok) room = await res.json(); } catch {}
    document.getElementById('nav-room-name').textContent = room.name;
    document.getElementById('room-name').textContent = room.name;
    document.getElementById('room-type').textContent = `${room.type} · Capacity: ${room.capacity}`;
    document.getElementById('cap-label').textContent = `${room.occupied} / ${room.capacity}`;
    const pct = Math.round((room.occupied / room.capacity) * 100);
    const fill = document.getElementById('cap-fill');
    fill.style.width = pct + '%';
    const sc = room.occupied === 0 ? 'available' : room.occupied >= room.capacity ? 'full' : 'partial';
    document.getElementById('room-status-card').className = 'room-status-card ' + sc;
    document.getElementById('status-pill').className = 'status-pill ' + sc;
    fill.className = 'cap-fill ' + sc;
    document.getElementById('status-text').textContent = {available:'Available',partial:'Partial',full:'Full'}[sc];
    if (sc === 'full' && !currentEntryId) { document.getElementById('full-banner').style.display = 'block'; document.getElementById('form-card').style.display = 'none'; }
  }

  function selectRole(role) {
    selectedRole = role;
    document.getElementById('btn-student').classList.toggle('selected', role==='Student');
    document.getElementById('btn-professor').classList.toggle('selected', role==='Professor');
    const lbl = document.getElementById('usn-label'), inp = document.getElementById('f-usn');
    if (role==='Professor') { lbl.innerHTML='Department <span>*</span>'; inp.placeholder='e.g., Computer Science'; }
    else { lbl.innerHTML='USN <span>*</span>'; inp.placeholder='e.g., 1XX21CS001'; }
  }
  document.getElementById('f-purpose').addEventListener('change', function() { document.getElementById('other-field').style.display = this.value==='Other' ? 'block' : 'none'; });

  function showError(msg) { const el=document.getElementById('error-msg'); el.textContent=msg; el.style.display='block'; setTimeout(()=>el.style.display='none',4000); }

  async function submitEntry() {
    const name=document.getElementById('f-name').value.trim(), usn=document.getElementById('f-usn').value.trim();
    const count=parseInt(document.getElementById('f-count').value)||1, team=document.getElementById('f-team').value.trim();
    let purpose=document.getElementById('f-purpose').value;
    if (purpose==='Other') purpose=document.getElementById('f-other').value.trim()||'Other';
    if (!name) return showError('Please enter your name.');
    if (!usn) return showError(selectedRole==='Professor'?'Please enter department.':'Please enter USN.');
    if (!purpose) return showError('Please select a purpose.');
    const btn=document.getElementById('submit-btn'); btn.disabled=true; btn.innerHTML='<span class="loader"></span>Confirming…';
    const payload={roomId:ROOM_ID,userName:name,role:selectedRole,usnOrDept:usn,teamMembers:team,purpose,peopleCount:count};
    try {
      const res=await fetch(`${API}/entries`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      const data=await res.json();
      if (!res.ok) { showError(data.message||'Booking failed.'); btn.disabled=false; btn.textContent='✅ Confirm Entry'; return; }
      currentEntryId=data.id; currentEntryData={...payload,id:data.id,entryTime:new Date().toISOString(),roomName:data.roomName||ROOMS_STATIC[ROOM_ID]?.name};
    } catch {
      currentEntryId='DEMO-'+Math.floor(Math.random()*9999); currentEntryData={...payload,id:currentEntryId,entryTime:new Date().toISOString(),roomName:ROOMS_STATIC[ROOM_ID]?.name};
    }
    saveToHistory(currentEntryData, true); showSuccess(currentEntryData); loadRoomHistory();
  }

  function saveToHistory(data, active) {
    const all=JSON.parse(localStorage.getItem('cc_history')||'[]');
    const idx=all.findIndex(e=>String(e.id)===String(data.id));
    if (idx!==-1) { all[idx]={...all[idx],...data,active}; } else { all.unshift({...data,roomId:ROOM_ID,active}); }
    localStorage.setItem('cc_history', JSON.stringify(all.slice(0,100)));
  }

  function showSuccess(data) {
    document.getElementById('form-card').style.display='none'; document.getElementById('full-banner').style.display='none';
    document.getElementById('success-card').style.display='block';
    document.getElementById('success-sub').innerHTML=`Checked into <strong>${data.roomName}</strong>`;
    document.getElementById('entry-info').innerHTML=`
      <div class="entry-info-row"><span class="key">Entry ID</span><span class="val">${data.id}</span></div>
      <div class="entry-info-row"><span class="key">Name</span><span class="val">${data.userName}</span></div>
      <div class="entry-info-row"><span class="key">Role</span><span class="val">${data.role}</span></div>
      <div class="entry-info-row"><span class="key">${data.role==='Professor'?'Department':'USN'}</span><span class="val">${data.usnOrDept}</span></div>
      <div class="entry-info-row"><span class="key">Purpose</span><span class="val">${data.purpose}</span></div>
      <div class="entry-info-row"><span class="key">People</span><span class="val">${data.peopleCount}</span></div>
      <div class="entry-info-row"><span class="key">Check-in time</span><span class="val">${new Date(data.entryTime).toLocaleTimeString()}</span></div>`;
    loadRoom(); loadRoomHistory();
  }

  async function checkOut() {
    if (!confirm('Are you sure you want to leave the room?')) return;
    try { if (currentEntryId && !String(currentEntryId).startsWith('DEMO')) await fetch(`${API}/entries/${currentEntryId}/exit`,{method:'PUT'}); } catch {}
    const all=JSON.parse(localStorage.getItem('cc_history')||'[]');
    const idx=all.findIndex(e=>String(e.id)===String(currentEntryId));
    if (idx!==-1) { all[idx].active=false; all[idx].exitTime=new Date().toISOString(); localStorage.setItem('cc_history',JSON.stringify(all)); }
    window.location.href='rooms.html';
  }

  async function loadRoomHistory() {
    const histSection=document.getElementById('room-history'), histList=document.getElementById('history-list');
    document.getElementById('hist-room-name').textContent=ROOMS_STATIC[ROOM_ID]?.name||'';
    histSection.style.display='block';
    let entries=[];
    try { const res=await fetch(`${API}/entries/room/${ROOM_ID}`); if (res.ok) entries=await res.json(); } catch {}
    if (!entries.length) { const all=JSON.parse(localStorage.getItem('cc_history')||'[]'); entries=all.filter(e=>e.roomId===ROOM_ID); }
    if (!entries.length) { histList.innerHTML='<div style="color:#9CA3AF;font-size:13px;padding:12px 0">No activity yet for this room.</div>'; return; }
    histList.innerHTML=entries.slice(0,10).map(e=>`
      <div class="history-card ${e.active?'active-entry':'exited-entry'}">
        <div class="hc-top">
          <div class="hc-name">${e.userName} <span style="font-weight:400;color:#9CA3AF;font-size:12px">(${e.role})</span></div>
          <div class="hc-badge ${e.active?'active':'exited'}">${e.active?'● Active':'Exited'}</div>
        </div>
        <div class="hc-detail">
          <span>🎯 ${e.purpose}</span><span>👥 ${e.peopleCount} people</span>
          <span>🕐 In: ${new Date(e.entryTime).toLocaleTimeString()}</span>
          ${e.exitTime?`<span>🕑 Out: ${new Date(e.exitTime).toLocaleTimeString()}</span>`:''}
        </div>
      </div>`).join('');
  }

  loadRoom(); loadRoomHistory(); setInterval(loadRoom, 20000);
</script>
</body>
</html>
